<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS BoxModel</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box {
            background-color: aqua;
        }
        .box1{
            color: brown;
            padding: 10px;
            border: 1px solid brown;
            margin: 25px;
            height: 200px;
            box-sizing: border-box;
        }
        .box2{
            color: blueviolet;
            padding: 10px;
            border: 1px solid blueviolet;
            margin: 15px;
            height: 200px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div class="box box1">I am a box</div>
    <div class="box box2">I am another box</div>
    <img src="image.png" width="600px" height="auto" alt="BoxModel Image">
</body>

</html>
