<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio | Video | Media Elements</title>
</head>
<body>
    <h1>Lets learn Audio, Video, Media Elements</h1>
    <h2>Video</h2>
    <video src="video1.mp4" width="200" controls autoplay loop muted></video>
    <video src="myvideo.mp4" width="200" controls autoplay loop muted  poster="thumbnail.jpeg"></video>
    <h2>Audio</h2>
    <audio src="sound.mp3" controls autoplay loop muted></audio>
    <h2>Media Elements</h2>
    <h3>SVG</h3>
    <svg height="100" width="100">
        <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="yellow"></circle>
    </svg>
    <img src="./one.svg" alt="one svg">
    <h3>iframe</h3>
    <iframe src="https://www.codewithharry.com/tutorials" frameborder="1" width="600" height="300"></iframe>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/XZwBNDGuWGU?si=F1lpH7lu3MgvwXxm&amp;start=793" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
