<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form - Let's learn it</title>
</head>
<body>
    <h1>Form to apply for Sigma Web Development Course - Teaching Assistant</h1>
    <form action="post">
        <div>
            <!--autofocus attribute-->
            <label for="username">Enter your Username:</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" autofocus>
        </div>
        <div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div>
        <div>
            <!--required attribute-->
            <label for="email">Enter your Email: </label>
            <input type="email" id="email" name="email" required>
        </div>
        <div>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
            <label for="subscribe">Subscribe to newsletter</label>
        </div>
        <div>
            <textarea name="comment" id="comment" rows="4" cols="50" placeholder="Enter your Comment"></textarea>
        </div>
        <div>
            <select name="fruits" id="fruits">
                <option value="choice">Select Fruit</option>
                <option value="mango">Mango</option>
                <option value="banana">Banana</option>
                <option value="orange">Orange</option>
            </select>
        </div>
        <div>
            <input type="password" pattern="[a-zA-Z0-9]+">
        </div>
    </form>
</body>
</html>
